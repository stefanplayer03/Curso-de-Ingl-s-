[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Atalho amigável: o front-end chama /api/chat em vez do caminho longo do Netlify Functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: qualquer rota que não seja arquivo estático nem função cai no index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
